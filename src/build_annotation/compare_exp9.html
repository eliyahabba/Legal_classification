<style>
  :root{

  .btn{font:inherit; font-size:15px; font-weight:500; padding:12px 22px; border-radius:9px; border:1.5px solid var(--line);
    background:var(--card); color:var(--ink); cursor:pointer}

  .btn.primary{background:var(--accent); border-color:var(--accent); color:#fff; flex:1}
  .empty-state{text-align:center; padding:60px 20px} .empty-state h1{font-family:var(--serif); font-weight:500}
  @media (max-width:640px){ .cmp{grid-template-columns:1fr} .excerpt{font-size:21px} }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

const A=DATA.annotators[0], B=DATA.annotators[1];   // {id,name}
let onlyDiff = true;
let view=[], pos=0;

document.getElementById('title').textContent = `השוואת תיוגים — ${A.name} מול ${B.name}`;
if(DATA.experiment){ document.getElementById('expName').textContent=DATA.experiment; }
else { document.getElementById('expWrap').style.display='none'; }

function build(keepId){
  const cur = keepId!=null ? keepId : (view[pos]!=null?DATA.items[view[pos]].id:null);
  view = DATA.items.map((_,i)=>i).filter(i=> onlyDiff ? DATA.items[i].differ : true);
  const p = cur!=null ? view.findIndex(i=>DATA.items[i].id===cur) : -1;
  pos = p>=0 ? p : 0;
}
function esc(s){ return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

const app=document.getElementById('app');
function render(){
  document.getElementById('fill').style.width = (view.length? (pos+1)/view.length*100:0)+'%';
  if(!view.length){
    document.getElementById('navbar').style.display='none';
    document.getElementById('count').textContent='';
    app.innerHTML=`<div class="empty-state"><h1>אין הבדלים להצגה</h1><p>במשפטים המשותפים אין מקומות שבהם סימנתן שונה.</p></div>`;
    return;
  }
  document.getElementById('navbar').style.display='flex';
  const it=DATA.items[view[pos]];
  document.getElementById('count').textContent = `פריט \u2068${pos+1}\u2069 מתוך \u2068${view.length}\u2069`;

  const peek = (label,val)=> val ? `<details class="peek"><summary>${label}</summary><div class="peek-body">${esc(val)}</div></details>` : '';
  const diffCat = it.r.final!==it.c.final;
  const col=(cls,who,d)=>{
    const yes=d.decision==='correct';
    const dec=`<span class="dec ${yes?'yes':'no'}">${yes?'כן, נכון':'לא, שגוי'}</span>`;
    const note = d.note&&d.note.trim()
      ? `<div class="note"><div class="lbl">הערה</div>${esc(d.note)}</div>`
      : `<div class="note"><div class="lbl">הערה</div><span class="empty">—</span></div>`;
    return `<div class="col ${cls}">
        <div class="who">${esc(who)}</div>${dec}
        <div class="flabel">קטגוריה סופית</div>
        <div class="fcat ${diffCat?'diff':''}">${esc(d.final)}</div>
        ${note}</div>`;
  };
  app.innerHTML=`<div class="wrap">
    ${it.differ?'<div class="diffflag">סימנתן כאן שונה</div><br>':''}
    <div class="eyebrow">התיוג שניתן על-ידי המודל</div>
    <div class="tag">${esc(it.assigned)}</div>
    <blockquote class="excerpt">${esc(it.sentence)}</blockquote>
    <div class="peeks">${peek('הקטגוריה הישנה (מהמאמר המקורי)',it.old_category)}${peek('הנימוק של המודל לבחירת הקטגוריה הנוכחית',it.reasoning)}</div>
    <div class="cmp">${col('rA',A.name,it.r)}${col('rB',B.name,it.c)}</div>
  </div>`;
  document.getElementById('prev').disabled = pos===0;
  document.getElementById('next').disabled = pos===view.length-1;
}
document.getElementById('prev').onclick=()=>{ if(pos>0){pos--;render();} };
document.getElementById('next').onclick=()=>{ if(pos<view.length-1){pos++;render();} };
document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;
  if(e.key==='ArrowLeft') document.getElementById('next').click();
  else if(e.key==='ArrowRight') document.getElementById('prev').click();
});
const od=document.getElementById('onlyDiff'); od.checked=onlyDiff;
od.onchange=e=>{ onlyDiff=e.target.checked; build(null); render(); };

build(null); render();
</script>
